{% extends 'base.html' %}
{% block content %}
<h2>¿Eliminar proveedor {{ proveedor.id_proveedor }}?</h2>
<p>{{ proveedor.nombre }} — esta acción no se puede deshacer.</p>
<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-danger">Sí, eliminar</button>
  <a href="{% url 'proveedores:lista' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
