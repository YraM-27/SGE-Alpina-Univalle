{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow-sm">

            <div class="card-body">

                <h3 class="mb-4">Nueva Orden de Pedido</h3>

                <form method="post">

                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Proveedor</label>

                        <select name="id_proveedor" class="form-select" required>

                            <option value="">Seleccione un proveedor</option>

                            {% for proveedor in proveedores %}
                            <option value="{{ proveedor.pk }}">
                                {{ proveedor.id_proveedor }} - {{ proveedor.nombre }}
                            </option>
                            {% endfor %}

                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Materia Prima</label>

                        <select name="id_insumo" class="form-select" required>

                            <option value="">Seleccione una materia prima</option>

                            {% for materia in materias %}
                            <option value="{{ materia.pk }}">
                                {{ materia.id_insumo }} - {{ materia.nombre }}
                            </option>
                            {% endfor %}

                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Cantidad</label>

                        <input
                            type="number"
                            name="cantidad"
                            min="1"
                            max="500"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Costo unitario</label>

                        <input
                            type="number"
                            step="0.01"
                            min="0"
                            name="precio_unitario"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Fecha del pedido</label>

                        <input
                            type="date"
                            value="{{ hoy|date:'Y-m-d' }}"
                            class="form-control"
                            readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Lugar de entrega</label>

                        <input
                            type="text"
                            name="lugar_entrega"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Estado</label>

                        <select name="estado" class="form-select" required>
                            <option value="Pendiente">Pendiente</option>
                            <option value="En proceso">En proceso</option>
                            <option value="Aprobada">Aprobada</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-between">

                        <a href="{% url 'ordenPedido:lista' %}" class="btn btn-secondary">
                            Cancelar
                        </a>

                        <button type="submit" class="btn btn-primary">
                            Crear orden
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
