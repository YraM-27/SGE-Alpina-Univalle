{% extends 'base.html' %}
{% block content %}
<h2>¿Eliminar cliente {{ cliente.id_cliente }}?</h2>
<p>{{ cliente.nombres }} {{ cliente.apellidos }} — esta acción no se puede deshacer.</p>
<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-danger">Sí, eliminar</button>
  <a href="{% url 'clientes:lista' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
