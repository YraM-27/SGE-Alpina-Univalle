{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Inventario actual</h2>

    <form method="get" class="row g-2 mb-3">
        <div class="col-auto">
            <select name="bodega" class="form-control" onchange="this.form.submit()">
                <option value="">Todas las bodegas</option>
                {% for bodega in bodegas %}
                <option value="{{ bodega.id_bodega }}" {% if bodega_seleccionada == bodega.id_bodega|stringformat:"s" %}selected{% endif %}>
                    {{ bodega.nombre_bodega }}
                </option>
                {% endfor %}
            </select>
        </div>
    </form>

    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th>Producto</th>
                <th>Bodega</th>
                <th class="text-end">Stock disponible</th>
            </tr>
        </thead>
        <tbody>
            {% for inv in inventarios %}
            <tr {% if inv.stock <= 0 %}class="table-danger"{% elif inv.stock < 10 %}class="table-warning"{% endif %}>
                <td>{{ inv.id_producto }}</td>
                <td>{{ inv.id_bodega }}</td>
                <td class="text-end"><strong>{{ inv.stock }}</strong></td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="text-center text-muted py-4">Sin datos de inventario.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
